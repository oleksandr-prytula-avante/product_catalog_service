x-env: &env
  env_file:
    - .env

services:
  app-dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: docker/app.dev.Dockerfile
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - .:/usr/src/app
    working_dir: /usr/src/app
    command: air
    depends_on:
      - spanner-emulator
    <<: *env

  app-build:
    profiles: ["build"]
    build:
      context: .
      dockerfile: docker/app.build.Dockerfile
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - .:/usr/src/app
    working_dir: /usr/src/app
    depends_on:
      - spanner-emulator
    <<: *env

  spanner-emulator:
    image: gcr.io/cloud-spanner-emulator/emulator
    ports:
      - "9010:9010" # gRPC
      - "9020:9020" # HTTP
    restart: always
    <<: *env
  
  spanner-init:
    image: google/cloud-sdk:slim
    depends_on:
      - spanner-emulator
    volumes:
      - ./scripts:/scripts
    entrypoint: ["/bin/bash", "/scripts/spanner-init.sh"]
    <<: *env

  atlas-migrate:
    build:
      context: .
      dockerfile: docker/atlas.Dockerfile
    depends_on:
      - spanner-init
    volumes:
      - ./scripts:/scripts
    working_dir: /scripts
    entrypoint: ["/bin/bash", "/scripts/atlas-run.sh"]
    <<: *env